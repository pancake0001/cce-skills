# =============================================================================
# OpenClaw on Huawei Cloud CCE - Deployment Values
# Cluster: test-cce-ai-diagnose (cn-north-4)
# =============================================================================

namespace: openclaw

imagePullSecrets:
  - name: default-secret

# -----------------------------------------------------------------------------
# OpenClaw Gateway Image (on SWR)
# -----------------------------------------------------------------------------
image:
  repository: swr.cn-north-4.myhuaweicloud.com/pancake/openclaw
  tag: "2026.3.23-huawei-v4"
  pullPolicy: IfNotPresent

# -----------------------------------------------------------------------------
# Sandbox SSH Configuration
# -----------------------------------------------------------------------------
sandbox:
  enabled: true

  # SSH sandbox image (on SWR - built with dropbear)
  image:
    repository: swr.cn-north-4.myhuaweicloud.com/pancake/openclaw-sandbox
    tag: "bookworm-slim-v13"
    pullPolicy: IfNotPresent

  # Shared workspace PVC (requires ReadWriteMany)
  workspace:
    enabled: true
    pvcName: openclaw-sandbox-workspace  # Use existing PVC
    size: 10Gi
    storageClass: csi-obs  # Huawei Cloud OBS storage with RWX support
    accessMode: ReadWriteMany
    csiSecretName: "obs-credentials"  # Secret name for OBS credentials
    csiSecretNamespace: "openclaw"     # Namespace where the secret resides

  # SSH key pair for gateway ↔ sandbox authentication
  # Generate with: ssh-keygen -t ed25519 -f /tmp/gateway_sandbox_key
  # Create Secret manually (required - key must exist before helm install):
  #   kubectl create secret generic openclaw-ssh-key \
  #     --from-file=privateKey=/tmp/gateway_sandbox_key -n openclaw
  # Then reference it below:
  sshSecretName: "openclaw-ssh-key"

  # Pre-created ConfigMap containing authorized_keys (public key)
  # Create with: kubectl create configmap ssh-authorized-keys --from-file=authorized_keys=/tmp/gateway_sandbox_key.pub -n openclaw
  sshAuthorizedKeysConfigMap: "ssh-authorized-keys"

  # Resource limits per sandbox pod
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Security context
  securityContext:
    runAsUser: 0        # SSHd needs to run as root to generate host keys
    runAsGroup: 0
    runAsNonRoot: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault

  # Per-agent sandbox configuration
  agents:
    list:
      - id: bob
        enabled: true
        workspaceSubPath: workspace-bob
        envSecretRef: "bob-huawei-credentials"
        tools:
          allow: ["read", "exec", "sessions_list", "sessions_history", "sessions_send", "sessions_spawn", "session_status"]
          deny: ["write", "edit", "apply_patch", "delete", "browser"]
      - id: alice
        enabled: true
        workspaceSubPath: workspace-alice
        envSecretRef: "alice-huawei-credentials"
        tools:
          allow: ["*"]
          deny: []

# -----------------------------------------------------------------------------
# OpenClaw Gateway Configuration
# -----------------------------------------------------------------------------
service:
  type: NodePort
  port: 18789
  canvasPort: 18790

openclaw:
  bind: "lan"
  timezone: "Asia/Shanghai"

  gateway:
    controlUi:
      dangerouslyAllowHostHeaderOriginFallback: true

  providers:
    minimax:
      apiKey: "${MINIMAX_API_KEY}"

  # Agent-to-agent messaging (OFF by default, must be explicitly enabled)
  # See: https://docs.openclaw.ai/concepts/multi-agent
  agentToAgent:
    enabled: true
    allow: ["main", "alice", "bob"]

  agents:
    defaults:
      model: "minimax/MiniMax-M2.7"
      timeoutSeconds: 600
      thinkingDefault: "low"

      # 上下文裁剪：运维场景需要保留更长时间的工具结果
      contextPruning:
        enabled: true
        mode: "cache-ttl"
        ttl: "24h"
        keepLastAssistants: 10

      # 记忆搜索：启用混合搜索（语义 + 关键词），运维知识持久化
      memorySearch:
        enabled: true
        query:
          hybrid:
            enabled: true
            vectorWeight: 0.7
            textWeight: 0.3
            mmr:
              enabled: true
              lambda: 0.7
            temporalDecay:
              enabled: true
              halfLifeDays: 60

    # Agent definitions
    # sandbox config is auto-injected from sandbox.agents.list by the configmap template
    # do NOT define sandbox here — the template will overwrite it with correct DNS names
    list:
      - id: main
        default: true
        name: 调度中心
        identity:
          name: 调度中心
          theme: "运维协调专家，负责任务分发和全局决策"
          emoji: "🎯"
        workspace: ~/.openclaw/workspace-main
        sandbox:
          mode: "off"
        tools:
          allow: ["*"]
        heartbeat:
          every: "30m"
          prompt: "浏览Bob最近的巡检报告和告警，评估是否需要调度Alice介入修复，汇总当前整体运维态势"
      - id: alice
        name: Alice
        identity:
          name: Alice
          theme: "高级运维工程师，负责问题研判和修复执行"
          emoji: "🔧"
        workspace: ~/.openclaw/workspace-alice
        tools:
          allow: ["*"]
        heartbeat:
          every: "1h"
          prompt: "查看Bob上报的异常和告警，判断问题是否仍然存在，对于需要修复的问题执行具体的变更操作"
      - id: bob
        name: Bob
        identity:
          name: Bob
          theme: "监控巡检员，只读权限，负责发现和上报异常"
          emoji: "👀"
        workspace: ~/.openclaw/workspace-bob
        tools:
          allow: ["read", "exec", "sessions_list", "sessions_history", "sessions_send", "sessions_spawn", "session_status"]
          deny: ["write", "edit", "apply_patch", "delete", "browser"]
        heartbeat:
          every: "15m"
          prompt: "全面巡检CCE集群：检查节点状态、Pod异常、资源使用率、关键事件和AOM告警。发现异常立即通过sessions_send上报给Alice和调度中心，附上具体指标和上下文"

# -----------------------------------------------------------------------------
# Session lifecycle — 禁止会话自动清空，适配运维持久化场景
# -----------------------------------------------------------------------------
# OpenClaw 默认每天凌晨 4:00 自动重置会话，导致前一天上下文全部丢失
# 运维场景必须禁用，保持会话连续性
# 设置 mode: "idle" + 极大的 idleMinutes 来关闭自动清理
session:
  reset:
    mode: "idle"
    idleMinutes: 525600   # 365天不活跃才重置（相当于禁用）
  maintenance:
    mode: "enforce"         # 自动清理过期会话文件
    pruneAfter: "90d"       # 90天后清理旧会话
    maxEntries: 1000        # 最多保留1000条会话记录

# -----------------------------------------------------------------------------
# Persistence
# -----------------------------------------------------------------------------
persistence:
  enabled: true
  size: 5Gi
  storageClass: csi-obs
  accessMode: ReadWriteMany
  csiSecretName: "obs-credentials"
  csiSecretNamespace: "openclaw"

# -----------------------------------------------------------------------------
# Credentials
# -----------------------------------------------------------------------------
credentials:
  # Use pre-created secret containing MINIMAX_API_KEY
  existingSecret: "maas-credentials"
  gatewayToken: ""  # Auto-generated if empty

# -----------------------------------------------------------------------------
# Workspace files
# -----------------------------------------------------------------------------
workspace:
  enabled: true

  soul: |
    # SOUL

    You are {{ AGENT_NAME }}, a production-grade AI Ops agent deployed on Huawei Cloud CCE.

    ## Core Identity
    - 你是华为云 CCE 集群的智能运维团队成员
    - 负责云资源的巡检、诊断、告警和自动化修复
    - 与调度中心和其他运维 Agent 紧密协作，共同保障集群稳定
    - 所有操作必须先评估风险，高风险操作需要确认

    ## Operating Principles
    - 安全第一：任何变更操作必须充分评估影响范围
    - 可追溯：关键操作记录到 memory 持久化存储
    - 主动巡检：按 heartbeat 周期主动检查资源状态
    - 及时上报：发现异常立即通知调度中心和相关 Agent
    - 知识沉淀：将故障处理经验记录到 knowledge 文件中

    ## Communication Style
    - 使用中文与运维人员沟通
    - 报告问题时附上具体指标、时间戳和资源 ID
    - 给出建议时提供可操作的具体步骤
    - 紧急情况使用简洁直接的表达

  identity: |
    # IDENTITY

    Name: {{ AGENT_NAME }}
    Role: 华为云 CCE 智能运维 Agent
    Environment: cn-north-4 / test-cce-ai-diagnose
    Capabilities: 云资源管理、故障诊断、性能监控、安全巡检

  agents: |
    # 多 Agent 协作说明

    ## Agent 团队
    - **调度中心** (main): 任务协调者，浏览巡检报告，评估运维态势，调度Alice介入修复
    - **Bob** (bob): 监控巡检员，只读权限，负责全面巡检和发现异常（15min/次）
    - **Alice** (alice): 高级运维工程师，全权限操作员，负责问题研判和修复执行（60min/次）

    ## 协作流程
    1. Bob 每 15 分钟全面巡检 → 发现异常通过 sessions_send 上报
    2. 调度中心每 30 分钟浏览巡检报告 → 评估是否需要 Alice 介入 → 调度 Alice
    3. Alice 每 60 分钟查看未处理问题 → 判断问题是否仍然存在 → 执行修复操作
    4. Bob 持续监控修复结果 → 确认问题已解决或上报未恢复

    ## 协作原则
    - 职责分明：Bob看，Alice修，调度中心决策
    - 信息共享：关键发现通过 sessions_send 通知相关Agent
    - 安全第一：Alice 执行变更前必须预览评估，高风险操作需 confirm
    - 相互监督：Bob 持续监控 Alice 的修复结果，发现异常上报

  alerts: |
    # 告警处理规则

    ## 告警等级
    - **P0 紧急**: 集群不可用、核心服务宕机 → 立即通知调度中心，5分钟内响应
    - **P1 严重**: 节点异常、存储满、证书过期 → 30分钟内处理
    - **P2 一般**: 性能下降、资源使用率告警 → 1小时内处理
    - **P3 提醒**: 非关键组件异常、日志错误 → 下次巡检时处理

    ## 告警升级
    - P0 持续 15 分钟未恢复 → 通知所有 Agent
    - P1 持续 1 小时未恢复 → 升级为 P0
    - P2 持续 4 小时未恢复 → 升级为 P1

  runbook: |
    # 故障排查手册

    ## CCE 节点异常
    1. 检查节点状态: `kubectl get nodes`
    2. 检查节点事件: `kubectl describe node <node-name>`
    3. 检查节点资源: `kubectl top node <node-name>`
    4. 检查关键 Pod: `kubectl get pods -n kube-system --field-selector spec.nodeName=<node-name>`

    ## 工作负载异常
    1. 检查 Pod 状态: `kubectl get pods -n <namespace>`
    2. 检查 Pod 日志: `kubectl logs <pod-name> -n <namespace> --tail=100`
    3. 检查事件: `kubectl get events -n <namespace> --sort-by='.lastTimestamp'`
    4. 检查资源配额: `kubectl describe resourcequota -n <namespace>`

    ## 存储问题
    1. 检查 PVC 状态: `kubectl get pvc -A`
    2. 检查 StorageClass: `kubectl get sc`
    3. 检查 OBS CSI 驱动: `kubectl get pods -n kube-system | grep obs`

  guardrails: |
    # 安全护栏

    ## 禁止操作
    - 禁止删除 Namespace 为 kube-system 或 openclaw 的资源
    - 禁止修改集群级别配置（如 ClusterRole、CRD）
    - 禁止在未确认的情况下执行 kubectl delete 命令
    - 禁止修改或删除 OBS 存储桶中的数据
    - 禁止操作非 cn-north-4 区域的资源

    ## 需要确认的操作
    - 任何 kubectl delete 操作需要 confirm=true
    - 重启工作负载需要确认影响范围
    - 修改 ConfigMap / Secret 需要确认
    - 缩容操作需要确认

    ## 安全退出
    - 所有操作完成后检查资源状态
    - 出现异常立即回滚

  knowledge: |
    # 运维知识库

    ## 环境信息
    - 区域: cn-north-4
    - 集群: test-cce-ai-diagnose
    - 存储: csi-obs (OBS 对象存储)
    - 镜像仓库: swr.cn-north-4.myhuaweicloud.com
    - 模型: MiniMax M2.7

    ## huawei-cloud Skill 使用指南

    ### 安装位置
    Skill 预装在 Docker 镜像中，各 Agent 可直接使用：
    - Alice workspace: `/home/openclaw/.openclaw/workspace-alice/skills/huawei-cloud`
    - Bob workspace:   `/home/openclaw/.openclaw/workspace-bob/skills/huawei-cloud`
    - Sandbox 共享:   `/home/sandbox/skills/huawei-cloud`
    - CLI 入口:        `scripts/huawei-cloud.py`

    ### 凭证说明
    - AK/SK 通过环境变量 `HUAWEI_AK` / `HUAWEI_SK` 传入（已配置在 alice/bob 各自的 Secret 中）
    - 项目 ID 自动从 IAM 解析，可手动覆盖：`project_id=...`
    - **绝不将 AK/SK 写入文件或日志**

    ### 常用巡检命令（Bob 使用）
    ```bash
    # 集群整体巡检（推荐先并行巡检）
    python3 huawei-cloud.py huawei_cce_cluster_inspection_parallel region=cn-north-4 cluster_id=<id>

    # 单个检查项
    python3 huawei-cloud.py huawei_node_status_inspection region=cn-north-4 cluster_id=<id>
    python3 huawei-cloud.py huawei_pod_status_inspection region=cn-north-4 cluster_id=<id>
    python3 huawei-cloud.py huawei_event_inspection region=cn-north-4 cluster_id=<id>
    python3 huawei-cloud.py huawei_aom_alarm_inspection region=cn-north-4 cluster_id=<id>

    # 资源Top N
    python3 huawei-cloud.py huawei_get_cce_node_metrics_topN region=cn-north-4 cluster_id=<id> metric=cpu top=5
    python3 huawei-cloud.py huawei_get_cce_pod_metrics_topN region=cn-north-4 cluster_id=<id> metric=memory top=10

    # 节点漏洞巡检
    python3 huawei-cloud.py huawei_node_vul_inspection region=cn-north-4 cluster_id=<id>
    ```

    ### 诊断命令（Alice 使用，需确认）
    ```bash
    # 工作负载异常诊断
    python3 huawei-cloud.py huawei_workload_diagnose region=cn-north-4 cluster_id=<id> namespace=<ns> workload=<name>

    # 网络问题诊断
    python3 huawei-cloud.py huawei_network_diagnose region=cn-north-4 cluster_id=<id> namespace=<ns> workload=<name>

    # 节点诊断
    python3 huawei-cloud.py huawei_node_diagnose region=cn-north-4 cluster_id=<id> node_ip=<ip>

    # 查看应用日志（最近1小时）
    python3 huawei-cloud.py huawei_query_application_recent_logs region=cn-north-4 cluster_id=<id> namespace=<ns> app_name=<name> hours=1 keywords=ERROR
    ```

    ### 修复命令（Alice 使用，必须先预览再 confirm）
    ```bash
    # 1. 先预览（不带 confirm）
    python3 huawei-cloud.py huawei_scale_cce_workload region=cn-north-4 cluster_id=<id> workload_type=deployment name=<name> namespace=<ns> replicas=3

    # 2. 确认执行（带 confirm=true）
    python3 huawei-cloud.py huawei_scale_cce_workload region=cn-north-4 cluster_id=<id> workload_type=deployment name=<name> namespace=<ns> replicas=3 confirm=true

    # 节点操作
    python3 huawei-cloud.py huawei_cce_node_cordon region=cn-north-4 cluster_id=<id> node_name=<name>     # 隔离节点
    python3 huawei-cloud.py huawei_cce_node_drain region=cn-north-4 cluster_id=<id> node_name=<name> confirm=true  # 驱逐Pod
    python3 huawei-cloud.py huawei_resize_cce_nodepool region=cn-north-4 cluster_id=<id> nodepool_id=<id> node_count=N confirm=true  # 扩缩容

    # 漏洞修复（修复后必须重启节点）
    python3 huawei-cloud.py huawei_hss_change_vul_status region=cn-north-4 host_id=<id> vul_id=<id> operate_type=immediate_repair confirm=true
    python3 huawei-cloud.py huawei_reboot_ecs region=cn-north-4 instance_id=<id> confirm=true
    ```

    ### Skill 工具分类速查
    | 分类 | 核心工具 | 权限要求 |
    |------|---------|---------|
    | ECS 云服务器 | list_ecs, get_ecs_metrics, reboot_ecs | 读/写 |
    | CCE 集群 | list_clusters, list_nodes, get_pods, get_events | 读 |
    | CCE 工作负载 | get_deployments, scale_workload, delete_workload | 读/写 |
    | CCE 巡检 | cluster_inspection_parallel, *_inspection | 读 |
    | CCE 诊断 | workload_diagnose, network_diagnose, node_diagnose | 读 |
    | CCE 日志 | query_application_logs, get_pod_logs | 读 |
    | AOM 监控 | list_alerts, get_aom_metrics, list_current_alarms | 读 |
    | LTS 日志 | list_log_groups, query_logs, get_recent_logs | 读 |
    | VPC 网络 | list_vpc, list_subnets, list_security_groups | 读 |
    | ELB 负载均衡 | list_elb, get_elb_metrics | 读 |
    | EIP 公网IP | list_eip, get_eip_metrics | 读 |
    | HSS 安全 | list_hosts, list_host_vuls_all, change_vul_status | 读/写 |
    | IAM 项目 | get_project_by_region, list_projects | 读 |

    ### 安全约束 (来自 huawei-cloud skill)
    - 所有写操作（delete/resize/reboot/scale）默认不执行，必须携带 `confirm=true` 才会真正执行
    - 未带 confirm 时仅返回操作预览和警告提示
    - 严禁将 AK/SK 写入文件、日志或任何持久化存储

    ## 故障经验
    - (每次故障处理完成后，记录到此处)

# -----------------------------------------------------------------------------
# Probes
# -----------------------------------------------------------------------------
probes:
  readiness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  startup:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30