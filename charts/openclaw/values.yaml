# OpenClaw Helm Chart Values
# https://docs.openclaw.ai/

# -- Override the name of the chart
nameOverride: ""
# -- Override the full name of the release
fullnameOverride: ""

# Image configuration
image:
  # -- Container image repository
  # For China users, use Huawei Cloud mirror:
  #   repository: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/ghcr.io/openclaw/openclaw
  repository: ghcr.io/openclaw/openclaw
  # -- Container image tag
  tag: "2026.3.23-2"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# =============================================================================
# Multi-Agent SSH Sandbox Configuration
# When sandbox.enabled=true, each agent runs in its own isolated sandbox Pod
# accessed via SSH by the central Gateway.
# =============================================================================
sandbox:
  # -- Enable SSH sandbox mode (each agent gets its own sandbox Pod accessed via SSH)
  enabled: false

  # -- SSH host key secret name (auto-generated if empty)
  # The secret should contain: ssh_host_rsa_key, ssh_host_ecdsa_key, ssh_host_ed25519_key
  hostKeySecret: ""

  # -- Shared workspace PVC for all sandbox pods (ReadWriteMany required)
  workspace:
    # -- Enable shared workspace storage
    enabled: true
    # -- PVC name (auto-generated if empty)
    pvcName: ""
    # -- Storage size
    size: 10Gi
    # -- Storage class (must support ReadWriteMany - NFS, AzureFiles, CephFS, etc.)
    storageClass: ""
    # -- Access mode
    accessMode: ReadWriteMany

  # -- SSH sandbox container image (must have SSH server running)
  image:
    # -- Container image repository
    # Build your own based on ghcr.io/openclaw/openclaw-sandbox-common:bookworm-slim
    # See: https://docs.openclaw.ai/gateway/sandboxing#ssh-backend
    repository: ghcr.io/openclaw/openclaw-sandbox-common
    tag: "bookworm-slim"
    pullPolicy: IfNotPresent

  # -- Resource limits for each sandbox pod
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # -- Security context for sandbox containers
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault

  # -- Environment variables for sandbox pods (e.g., cloud provider credentials)
  # These are passed to each sandbox container
  # Example for Huawei Cloud AKSK:
  #   env:
  #     - name: HUAWEI_ACCESS_KEY
  #       value: "your-access-key"
  #     - name: HUAWEI_SECRET_KEY
  #       value: "your-secret-key"
  env: []

  # =============================================================================
  # Per-Agent Sandbox Configuration
  # Each agent gets its own sandbox Pod with independent:
  # - SSH endpoint
  # - Workspace subdirectory (under shared PVC)
  # - Tool permissions
  # =============================================================================
  agents:
    # -- List of agents with sandbox configuration
    # Set sandbox.enabled=true per-agent to enable SSH sandbox for that agent
    list:
      # Example (uncomment and configure):
      # - id: alice
      #   enabled: true
      #   workspaceSubPath: workspace-alice
      #   envSecretRef: "alice-huawei-credentials"  # Secret name for per-agent env vars (e.g., AKSK)
      #   tools:
      #     allow: ["*"]
      #     deny: []
      # - id: bob
      #   enabled: true
      #   workspaceSubPath: workspace-bob
      #   envSecretRef: "bob-huawei-credentials"  # Secret name for per-agent env vars (e.g., AKSK)
      #   tools:
      #     allow: ["read", "exec", "sessions_list", "sessions_history"]
      #     deny: ["write", "edit", "apply_patch", "delete", "browser"]

  # -- SSH private key for gateway to authenticate to sandbox pods
  # Generate with: ssh-keygen -t ed25519 -f /tmp/gateway_sandbox_key
  # The corresponding public key should be added to sandbox pods' authorized_keys
  # (auto-generated placeholder if empty - must be replaced with real key for production)
  sshPrivateKey: ""

  # -- Use an existing Kubernetes Secret for the SSH private key instead of storing it in values
  # If set, sshPrivateKey is ignored. Secret must contain key "privateKey".
  # Create with: kubectl create secret generic openclaw-ssh-key --from-file=privateKey=/tmp/gateway_sandbox_key -n openclaw
  sshSecretName: ""

  # -- Use an existing Kubernetes ConfigMap for the authorized_keys instead of storing it in values
  # If set, authorizedKeys is ignored. ConfigMap must contain key "authorized_keys".
  # Create with: kubectl create configmap ssh-authorized-keys --from-file=authorized_keys=/tmp/gateway_sandbox_key.pub -n openclaw
  sshAuthorizedKeysConfigMap: ""

  # -- SSH public key that will be added to each sandbox pod's authorized_keys
  # This is the public key corresponding to the gateway's sshPrivateKey
  # Generate with: cat /tmp/gateway_sandbox_key.pub
  # Example: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI....."
  # Only used if sshAuthorizedKeysConfigMap is not set
  authorizedKeys: ""


# OpenClaw application settings
openclaw:
  # -- Bind mode: "lan" for network access, "localhost" for local only
  bind: "lan"
  # -- Timezone environment variable
  timezone: "UTC"
  # -- Config file mode: "merge" keeps existing config and merges helm values (helm wins conflicts),
  # "overwrite" replaces config entirely
  configMode: "merge"
  # -- Skills to install from ClawHub
  skills: []

  # Agent configuration (maps to agents.defaults in openclaw.json)
  agents:
    defaults:
      # -- Primary model in provider/model format
      model: "minimax/MiniMax-M2.7"
      # -- Timeout in seconds for agent operations
      timeoutSeconds: 600
      # -- Thinking mode: "low", "high", or "off"
      thinkingDefault: "low"

      # -- Compaction configuration (context compression)
      # When context gets too long, OpenClaw compacts older history to stay within limits
      compaction:
        # -- Enable compaction configuration
        enabled: true
        # -- Compaction mode: "default" (recommended) or "safeguard" (experimental, has issues with large contexts)
        # "default" - direct summarization, more reliable
        # "safeguard" - chunked summarization, may silently fail on large contexts
        mode: "default"
        # -- Model to use for compaction summarization (optional, uses primary model if not set)
        # Format: provider/model-id
        # Example: "huaweicloud-maas/DeepSeek-V3" for cheaper/faster summarization
        model: ""
        # -- Reserve tokens floor - triggers compaction earlier to avoid context overflow
        # Recommended: 40000-60000 depending on model context window
        reserveTokensFloor: 60000
        # -- Memory flush configuration
        memoryFlush:
          # -- Enable memory flush before compaction
          enabled: true
          # -- Soft threshold tokens
          softThresholdTokens: 40000
          # -- Custom flush prompt (optional)
          prompt: ""

      # -- Context pruning configuration
      # Trims old tool results in-memory per request
      # Recommended for ops: longer TTL to preserve troubleshooting context
      contextPruning:
        # -- Enable context pruning
        enabled: true
        # -- Pruning mode: "cache-ttl" or "off"
        mode: "cache-ttl"
        # -- Cache TTL duration (e.g., "24h", "6h", "30m")
        ttl: "24h"
        # -- Number of recent assistant messages to keep
        keepLastAssistants: 10

      # -- Memory search configuration (semantic + keyword hybrid search)
      # Enables agent to search past operation records via memory_search tool
      # Uses builtin SQLite backend with optional embedding provider
      # See: https://docs.openclaw.ai/reference/memory-config
      memorySearch: {}
      # Example:
      #   memorySearch:
      #     enabled: true
      #     query:
      #       hybrid:
      #         enabled: true
      #         vectorWeight: 0.7
      #         textWeight: 0.3
      #         mmr:
      #           enabled: true
      #           lambda: 0.7
      #         temporalDecay:
      #           enabled: true
      #           halfLifeDays: 60

    # -- Multi-agent configuration (maps to agents.list in openclaw.json)
    # Define multiple agents with different permissions for separation of duties
    # Example: viewer agent for monitoring, operator agent for actions
    list:
      # Example configuration:
      # - id: alice
      #   workspace: ~/.openclaw/workspace-alice
      #   sandbox:
      #     enabled: true
      #     backend: ssh
      #     scope: agent
      #     workspaceAccess: rw
      #     ssh:
      #       target: "openclaw-sandbox-alice"
      #       workspaceRoot: /home/openclaw/workspace
      #   tools:
      #     allow: ["*"]
      #   bindings:
      #     - channel: telegram
      #       botToken: "${ALICE_TELEGRAM_BOT_TOKEN}"
      # - id: bob
      #   workspace: ~/.openclaw/workspace-bob
      #   sandbox:
      #     enabled: true
      #     backend: ssh
      #     scope: agent
      #     workspaceAccess: ro
      #     ssh:
      #       target: "openclaw-sandbox-bob"
      #       workspaceRoot: /home/openclaw/workspace
      #   tools:
      #     allow: ["read", "exec", "sessions_list", "sessions_history"]
      #     deny: ["write", "edit", "apply_patch", "delete", "browser"]

  # -- Model providers configuration (maps to models.providers in openclaw.json)
  # Supports additional LLM providers like MiniMax, OpenAI-compatible endpoints, etc.
  # Example for MiniMax (China):
  providers:
    minimax:
      baseUrl: "https://api.minimaxi.com/anthropic"
      apiKey: ""  # Set via --set openclaw.providers.minimax.apiKey="your-key" or openclaw.configOverrides.auth.profiles.minimax:cn.key
      api: "anthropic-messages"
      authHeader: true
      models:
        - id: "MiniMax-M2.7"
          name: "MiniMax M2.7"
          reasoning: true
          input: ["text"]
          cost:
            input: 0.3
            output: 1.2
            cacheRead: 0.06
            cacheWrite: 0.375
          contextWindow: 204800
          maxTokens: 131072

  # -- Authentication profiles for LLM providers
  # Each profile corresponds to a provider configured in 'providers'
  # The key (e.g., "minimax:cn") must match the provider ID
  # Set the API key via --set openclaw.auth.profiles.minimax:cn.key="your-key"
  auth:
    profiles: {}

  # -- Raw JSON overrides merged into openclaw.json
  # Use this for advanced configuration not covered by other options
  # Example:
  #   configOverrides:
  #     channels:
  #       telegram:
  #         enabled: true
  configOverrides: {}

  # -- Multi-agent message routing bindings
  # Routes incoming messages to specific agents based on channel, account, peer, etc.
  # See: https://docs.openclaw.ai/concepts/multi-agent#routing-rules
  bindings: []
  # Example:
  # bindings:
  #   - agentId: alice
  #     match:
  #       channel: telegram
  #       accountId: alice-bot
  #   - agentId: bob
  #     match:
  #       channel: telegram
  #       accountId: bob-bot

  # -- Agent-to-agent messaging configuration (maps to tools.agentToAgent in openclaw.json)
  # Off by default — must be explicitly enabled for agents to send messages to each other.
  # See: https://docs.openclaw.ai/concepts/multi-agent
  agentToAgent: {}
  # Example:
  #   agentToAgent:
  #     enabled: true
  #     allow: ["main", "alice", "bob"]

# -- Custom workspace files for agent persona and ops templates
# These files are copied to each agent's workspace on first install.
# For multi-agent mode, define per-agent files under workspace.agents.<agentId>.
# Shared files (alerts/runbook/guardrails/knowledge) go to all agents.
# Subsequent changes to these values will NOT overwrite existing files (to preserve agent experience)
# To force update, delete the PVC and reinstall, or manually edit files in the container
workspace:
  # -- Whether to enable custom workspace files
  enabled: true
  # -- SOUL.md: Agent personality and behavior definition (shared fallback)
  # For multi-agent, override per agent under workspace.agents.<id>.soul
  soul: ""
  # -- IDENTITY.md: Agent identity information (shared fallback)
  identity: ""
  # -- USER.md: User information (can be customized)
  user: ""
  # -- AGENTS.md: Multi-agent collaboration guide (shared fallback)
  agents: ""
  # -- ALERTS.md: Alert handling rules (shared, goes to all agents)
  alerts: ""
  # -- RUNBOOK.md: Troubleshooting runbook (shared, goes to all agents)
  runbook: ""
  # -- KNOWLEDGE.md: Knowledge base for incidents (shared, goes to all agents)
  knowledge: ""
  # -- GUARDRAILS.md: Safety boundaries and prohibited operations (shared)
  guardrails: ""
  # -- TOOLS.md: Available tools per agent role (shared)
  tools: ""
  # -- USER.md: Operations team profile and preferences (shared)
  user: ""
  # -- BOOTSTRAP.md: One-time startup verification checklist (shared)
  bootstrap: ""
  # -- MEMORY.md: Long-term memory template (shared, agents will append to it)
  memory: ""
  # -- INSPECTION.md: Inspection checklist (for ops agent)
  inspection: ""
  # -- Per-agent workspace file overrides for multi-agent mode
  # Keyed by agent ID. Each agent gets its own SOUL.md, IDENTITY.md, AGENTS.md.
  # Shared files (alerts/runbook/knowledge/guardrails) are still copied from the top-level values.
  agents: {}
  # Example:
  #   agents:
  #     main:
  #       soul: |
  #         # SOUL for 调度中心...
  #       identity: |
  #         # IDENTITY for 调度中心...
  #       agents: |
  #         # AGENTS.md from 调度中心 perspective...
  #     alice:
  #       soul: |
  #         # SOUL for Alice...


  # -- Additional custom files
  # Key is filename, value is content
  extraFiles: {}
    # CUSTOM.md: |
    #   # Custom Instructions
    #   Add your custom instructions here

# -- Extra environment variables for the main container
# These are added directly to the container env, not from secrets
extraEnv: []

# Credentials for LLM providers and channels
credentials:
  # -- Anthropic API key (required if using Anthropic models)
  anthropicApiKey: ""
  # -- OpenAI API key (optional, for OpenAI models)
  openaiApiKey: ""
  # -- Gateway authentication token (auto-generated if empty)
  gatewayToken: ""
  # -- Extra secrets to add to the secret.yaml file as key-value pairs.
  # These will be automatically added as environment variables.
  # Example for multi-agent with separate Telegram bots:
  #   extraSecrets:
  #     OPENROUTER_API_KEY: "sk-or-..."
  #     ALICE_TELEGRAM_BOT_TOKEN: "123456:ABC-..."
  #     BOB_TELEGRAM_BOT_TOKEN: "789012:DEF-..."
  # Note: Telegram bot tokens are referenced in openclaw.bindings and openclaw.agents.list
  extraSecrets: {}
  # -- Use an existing secret instead of creating one
  # The secret must contain keys: ANTHROPIC_API_KEY, OPENAI_API_KEY, OPENCLAW_GATEWAY_TOKEN
  # and any other keys defined in extraSecrets if applicable.
  existingSecret: ""

# Chromium sidecar for browser automation
chromium:
  # -- Enable Chromium sidecar container
  enabled: true
  image:
    # -- Chromium container image repository
    # For China users, use Huawei Cloud mirror:
    #   repository: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/zenika/alpine-chrome
    repository: zenika/alpine-chrome
    # -- Chromium container image tag
    tag: "124"
    # -- Chromium image pull policy
    pullPolicy: IfNotPresent
  # -- Resource requests and limits for Chromium container
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # -- Security context for Chromium container
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

# Persistence configuration
persistence:
  # -- Enable persistent storage for OpenClaw data
  enabled: true
  # -- Storage size
  size: 5Gi
  # -- Storage class (leave empty for default)
  storageClass: ""
  # -- Access mode
  accessMode: ReadWriteOnce
  # -- Annotations for the PVC
  annotations: {}
  # -- Use an existing PVC instead of creating one
  # When set, the chart will not create a new PVC but use the specified one
  # This is useful for upgrading/reinstalling while preserving data
  existingClaim: ""
  # -- Labels to add to PVC for identification (useful for finding PVC after uninstall)
  labels: {}
  # -- Reclaim policy hint (actual policy is set on PV, not PVC)
  # Note: Set reclaimPolicy: Retain on your StorageClass or PV to prevent data loss on uninstall
  # Example StorageClass with Retain:
  #   apiVersion: storage.k8s.io/v1
  #   kind: StorageClass
  #   metadata:
  #     name: openclaw-retain
  #   provisioner: rancher.io/local-path
  #   reclaimPolicy: Retain
  reclaimPolicy: ""

# Service configuration
service:
  # -- Service type
  type: ClusterIP
  # -- Gateway port (WebSocket control plane)
  port: 18789
  # -- Canvas port (HTTP server)
  canvasPort: 18793
  # -- Annotations for the service
  annotations: {}

# Ingress configuration
ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Annotations for the ingress
  # Example for WebSocket support with nginx:
  # nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  # nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  # nginx.org/websocket-services: "openclaw"
  annotations: {}
  # -- Ingress hosts configuration
  hosts:
    - host: openclaw.local
      paths:
        - path: /
          pathType: Prefix
          # -- Which service port to use (gateway or canvas)
          servicePort: gateway
  # -- TLS configuration
  tls: []
  #  - secretName: openclaw-tls
  #    hosts:
  #      - openclaw.local

# Resource requests and limits for main OpenClaw container
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# Security context for the pod
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Security context for the main OpenClaw container
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  seccompProfile:
    type: RuntimeDefault

# Service account configuration
serviceAccount:
  # -- Create a service account
  create: true
  # -- Service account name (auto-generated if empty)
  name: ""
  # -- Annotations for the service account
  annotations: {}

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Annotations for the pod
podAnnotations: {}

# -- Labels for the pod
podLabels: {}

# -- Revision history limit for Deployment (number of old ReplicaSets to keep)
revisionHistoryLimit: 5

# -- Extra manifests to deploy alongside the chart.
# Can be used for Middleware, ServersTransport, or any other CRDs.
# Example:
#   extraManifests:
#     - apiVersion: traefik.io/v1alpha1
#       kind: Middleware
#       metadata:
#         name: redirect-https
#       spec:
#         redirectScheme:
#           scheme: https
extraManifests: []

# =============================================================================
# Session lifecycle configuration (top-level key in openclaw.json)
# OpenClaw defaults to daily reset at 4AM — sessions auto-clear.
# For ops agents that need persistent context across days, set reset.mode: "never".
# =============================================================================
# -- Session management (maps to session in openclaw.json)
# See: https://docs.openclaw.ai/concepts/session
session: {}
# Example:
#   session:
#     dmScope: "per-channel-peer"  # Isolate DMs per sender
#     reset:
#       mode: "never"              # Never auto-reset sessions
#     maintenance:
#       mode: "enforce"
#       pruneAfter: "90d"
#       maxEntries: 1000

# -- Memory backend configuration (maps to memory in openclaw.json)
# For advanced memory backends (QMD, etc.)
# See: https://docs.openclaw.ai/concepts/memory
memory: {}
# Example:
#   memory:
#     backend: "qmd"
#     citations: "auto"

# Probes configuration
probes:
  # Liveness probe
  liveness:
    # -- Enable liveness probe
    enabled: true
    # -- Initial delay before probe starts
    initialDelaySeconds: 30
    # -- Probe interval
    periodSeconds: 10
    # -- Probe timeout
    timeoutSeconds: 5
    # -- Failure threshold
    failureThreshold: 3
    # -- Success threshold
    successThreshold: 1
  # Readiness probe
  readiness:
    # -- Enable readiness probe
    enabled: true
    # -- Initial delay before probe starts
    initialDelaySeconds: 10
    # -- Probe interval
    periodSeconds: 10
    # -- Probe timeout
    timeoutSeconds: 5
    # -- Failure threshold
    failureThreshold: 3
    # -- Success threshold
    successThreshold: 1
  # Startup probe
  startup:
    # -- Enable startup probe
    enabled: true
    # -- Initial delay before probe starts
    initialDelaySeconds: 5
    # -- Probe interval
    periodSeconds: 5
    # -- Probe timeout
    timeoutSeconds: 5
    # -- Failure threshold (allows up to 30*5=150s for startup)
    failureThreshold: 30
    # -- Success threshold
    successThreshold: 1
