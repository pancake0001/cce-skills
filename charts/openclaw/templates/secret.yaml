{{- if not .Values.credentials.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw.fullname" . }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.credentials.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.credentials.anthropicApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.credentials.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.credentials.openaiApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.credentials.gatewayToken }}
  OPENCLAW_GATEWAY_TOKEN: {{ .Values.credentials.gatewayToken | b64enc | quote }}
  {{- else }}
  OPENCLAW_GATEWAY_TOKEN: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- range $key, $value := .Values.credentials.extraSecrets }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
  # SSH private key for gateway to connect to sandbox pods
  # Key must be named "privateKey" to match deployment.yaml volume mount subPath
  # If sandbox.sshSecretName is set, the Secret is managed externally (recommended)
  # Otherwise, if sandbox.sshPrivateKey is set in values, it will be stored here
  {{- if and .Values.sandbox.enabled .Values.sandbox.agents.list }}
  {{- if not .Values.sandbox.sshSecretName }}
  {{- if .Values.sandbox.sshPrivateKey }}
  privateKey: {{ .Values.sandbox.sshPrivateKey | b64enc | quote }}
  {{- else if not .Values.sandbox.sshPrivateKey }}
  # No SSH key provided - sandbox SSH authentication will not work
  # Generate a keypair with: ssh-keygen -t ed25519 -f /tmp/gateway_sandbox_key
  # Create the Secret manually:
  #   kubectl create secret generic openclaw-ssh-key --from-file=privateKey=/tmp/gateway_sandbox_key -n openclaw
  # Then set sandbox.sshSecretName: "openclaw-ssh-key" in values
  {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
